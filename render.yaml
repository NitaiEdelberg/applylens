# Render Blueprint for the ApplyLens backend (FastAPI + Groq).
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# Set GROQ_API_KEY in the dashboard after the service is created.
services:
  - type: web
    name: applylens-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: GROQ_API_KEY
        sync: false                       # set this yourself (secret)
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # Pin Python so scikit-learn/scipy/psycopg2 install from wheels (3.13 has
      # no scikit-learn 1.3.2 wheel -> source build -> deploy fails).
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Optional accounts + cloud tracker (Circle 3). Leave DATABASE_URL unset to
      # use local SQLite; set it to the Supabase SESSION POOLER URI for prod.
      - key: DATABASE_URL
        sync: false                       # set to Supabase session-pooler URI (secret)
      - key: JWT_SECRET
        generateValue: true               # Render generates a strong random secret
